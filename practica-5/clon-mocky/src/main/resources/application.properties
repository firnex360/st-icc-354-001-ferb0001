spring.application.name=clon-mocky

# ========================
# Servidor
# ========================
server.port=${APP_PORT:8080}

# ========================
# Base de Datos (parametrizada via variables de ambiente)
# ========================
spring.datasource.url=${DB_URL:jdbc:mysql://mysql:3306/mocky_db}
spring.datasource.driver-class-name=${DB_DRIVER:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}

# ========================
# Spring Session + Redis
# ========================
spring.session.store-type=redis
spring.data.redis.host=${REDIS_HOST:redis}
spring.data.redis.port=${REDIS_PORT:6379}

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ========================
# JWT Configuration (custom properties)
# ========================
app.jwt.secret=${JWT_SECRET:Y2xvbi1tb2NreS1zZWNyZXQta2V5LXByYWN0aWNhLTIwMjUtc3ByaW5nLWJvb3Q=}
app.jwt.expiration=${JWT_EXPIRATION:60}

# ========================
# Internacionalizacion (i18n)
# ========================
spring.messages.basename=messages
spring.messages.encoding=UTF-8
