<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head(${esNuevo} ? #{project.create} : #{project.edit})}">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Proyecto</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container flex-grow-1">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-white">
                        <h4 class="mb-0">
                            <i class="bi" th:classappend="${esNuevo} ? 'bi-folder-plus' : 'bi-pencil-square'"></i>
                            <span th:text="${esNuevo} ? #{project.create} : #{project.edit}">Proyecto</span>
                        </h4>
                    </div>
                    <div class="card-body">
                        <form th:action="${esNuevo} ? @{/proyectos/crear} : @{'/proyectos/actualizar/' + ${proyecto.id}}"
                              method="post">

                            <!-- Nombre del proyecto -->
                            <div class="mb-3">
                                <label for="nombre" class="form-label" th:text="#{project.name}">Nombre</label>
                                <input type="text" class="form-control" id="nombre" name="nombre"
                                       th:value="${proyecto.nombre}" required maxlength="100"/>
                            </div>

                            <!-- Descripción -->
                            <div class="mb-4">
                                <label for="descripcion" class="form-label" th:text="#{project.description}">Descripción</label>
                                <textarea class="form-control" id="descripcion" name="descripcion"
                                          rows="3" maxlength="500" th:text="${proyecto.descripcion}"></textarea>
                            </div>

                            <!-- Botones -->
                            <div class="d-flex justify-content-between">
                                <a th:href="@{/proyectos}" class="btn btn-secondary">
                                    <i class="bi bi-arrow-left"></i> <span th:text="#{project.cancel}">Cancelar</span>
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-lg"></i> <span th:text="#{project.save}">Guardar</span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
