services:
  mysql:
    image: mysql:8.4
    container_name: clonmocky-mysql
    restart: unless-stopped
    ports:
      - "33006:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mocky_db
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - clon-mocky-net

  redis:
    image: redis:7-alpine
    container_name: clonmocky-redis
    restart: unless-stopped
    networks:
      - clon-mocky-net

  app1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clonmocky-app1
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      APP_PORT: 8080
      DB_URL: jdbc:mysql://mysql:3306/mocky_db
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "true"
      JWT_SECRET: Y2xvbi1tb2NreS1zZWNyZXQta2V5LXByYWN0aWNhLTIwMjUtc3ByaW5nLWJvb3Q=
      JWT_EXPIRATION: 60
    expose:
      - "8080"
    networks:
      - clon-mocky-net

  app2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clonmocky-app2
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      APP_PORT: 8081
      DB_URL: jdbc:mysql://mysql:3306/mocky_db
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "true"
      JWT_SECRET: Y2xvbi1tb2NreS1zZWNyZXQta2V5LXByYWN0aWNhLTIwMjUtc3ByaW5nLWJvb3Q=
      JWT_EXPIRATION: 60
    expose:
      - "8081"
    networks:
      - clon-mocky-net

  app3:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clonmocky-app3
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    environment:
      APP_PORT: 8082
      DB_URL: jdbc:mysql://mysql:3306/mocky_db
      DB_DRIVER: com.mysql.cj.jdbc.Driver
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JPA_DDL_AUTO: update
      JPA_SHOW_SQL: "true"
      JWT_SECRET: Y2xvbi1tb2NreS1zZWNyZXQta2V5LXByYWN0aWNhLTIwMjUtc3ByaW5nLWJvb3Q=
      JWT_EXPIRATION: 60
    expose:
      - "8082"
    networks:
      - clon-mocky-net

  haproxy:
    image: haproxy:3.0-alpine
    container_name: clonmocky-haproxy
    restart: unless-stopped
    depends_on:
      - app1
      - app2
      - app3
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/certs:/etc/ssl/certs:ro
    networks:
      - clon-mocky-net

volumes:
  mysql-data:

networks:
  clon-mocky-net:
    driver: bridge
