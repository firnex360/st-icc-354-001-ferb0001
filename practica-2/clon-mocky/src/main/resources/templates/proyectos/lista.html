<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head th:replace="~{fragments/layout :: head(#{project.title})}">
</head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container flex-grow-1">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>
                <i class="bi bi-folder2-open"></i> <span th:text="#{project.title}">Gestión de Proyectos</span>
            </h2>
            <a th:href="@{/proyectos/nuevo}" class="btn btn-primary">
                <i class="bi bi-plus-lg"></i> <span th:text="#{project.create}">Crear Proyecto</span>
            </a>
        </div>

        <div class="row g-4">
            <div th:each="proyecto : ${proyectos}" class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100">
                    <div class="card-body">
                        <h5 class="card-title">
                            <i class="bi bi-folder"></i>
                            <span th:text="${proyecto.nombre}">Proyecto</span>
                        </h5>
                        <p class="card-text text-muted" th:text="${proyecto.descripcion ?: 'Sin descripción'}">Descripción</p>
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="badge bg-info">
                                <i class="bi bi-plug"></i>
                                <span th:text="${proyecto.mocks != null ? proyecto.mocks.size() : 0}">0</span> mocks
                            </span>
                            <small class="text-muted"
                                   th:text="${#temporals.format(proyecto.fechaCreacion, 'dd/MM/yyyy')}">01/01/2025</small>
                        </div>
                        <!-- Mostrar propietario si es admin -->
                        <div sec:authorize="hasRole('ADMIN')" class="mt-2">
                            <small class="text-muted">
                                <i class="bi bi-person"></i>
                                <span th:text="${proyecto.usuario?.username}">usuario</span>
                            </small>
                        </div>
                    </div>
                    <div class="card-footer bg-white d-flex justify-content-between">
                        <a th:href="@{'/proyectos/' + ${proyecto.id} + '/mocks'}" class="btn btn-sm btn-primary">
                            <i class="bi bi-plug"></i> <span th:text="#{nav.mocks}">Mocks</span>
                        </a>
                        <div class="btn-group btn-group-sm">
                            <a th:href="@{'/proyectos/editar/' + ${proyecto.id}}" class="btn btn-outline-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{'/proyectos/eliminar/' + ${proyecto.id}}"
                                  method="post" class="d-inline"
                                  th:attr="onsubmit='return confirm(\'' + #{project.confirm.delete} + '\')'">
                                <button type="submit" class="btn btn-outline-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mensaje vacío -->
            <div th:if="${#lists.isEmpty(proyectos)}" class="col-12">
                <div class="text-center text-muted py-5">
                    <i class="bi bi-inbox display-3 d-block mb-3"></i>
                    <p>No hay proyectos aún. ¡Crea tu primero!</p>
                    <a th:href="@{/proyectos/nuevo}" class="btn btn-primary">
                        <i class="bi bi-plus-lg"></i> <span th:text="#{project.create}">Crear Proyecto</span>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
