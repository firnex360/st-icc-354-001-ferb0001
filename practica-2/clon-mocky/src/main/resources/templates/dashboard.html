<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head th:replace="~{fragments/layout :: head(#{nav.dashboard})}">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container flex-grow-1">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <h2 class="mb-4">
            <i class="bi bi-speedometer2"></i> <span th:text="#{nav.dashboard}">Panel de Control</span>
        </h2>

        <!-- Tarjetas de estadísticas -->
        <div class="row g-4 mb-5">
            <!-- Total Proyectos -->
            <div class="col-md-4">
                <div class="card stat-card stat-card-blue shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-primary bg-opacity-10 text-primary rounded-circle p-3 me-3">
                            <i class="bi bi-folder2-open fs-3"></i>
                        </div>
                        <div>
                            <h6 class="card-subtitle text-muted" th:text="#{nav.projects}">Proyectos</h6>
                            <h2 class="card-title mb-0" th:text="${totalProyectos}">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Total Mocks -->
            <div class="col-md-4">
                <div class="card stat-card stat-card-green shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-success bg-opacity-10 text-success rounded-circle p-3 me-3">
                            <i class="bi bi-plug fs-3"></i>
                        </div>
                        <div>
                            <h6 class="card-subtitle text-muted" th:text="#{nav.mocks}">Mocks</h6>
                            <h2 class="card-title mb-0" th:text="${totalMocks}">0</h2>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Total Usuarios (solo admin) -->
            <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
                <div class="card stat-card stat-card-purple shadow-sm h-100">
                    <div class="card-body d-flex align-items-center">
                        <div class="stat-icon bg-warning bg-opacity-10 text-warning rounded-circle p-3 me-3">
                            <i class="bi bi-people fs-3"></i>
                        </div>
                        <div>
                            <h6 class="card-subtitle text-muted" th:text="#{nav.users}">Usuarios</h6>
                            <h2 class="card-title mb-0" th:text="${totalUsuarios}">0</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla de proyectos recientes -->
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-white d-flex justify-content-between align-items-center">
                <h5 class="mb-0">
                    <i class="bi bi-folder2-open"></i> <span th:text="#{nav.projects}">Proyectos</span>
                </h5>
                <a th:href="@{/proyectos/nuevo}" class="btn btn-sm btn-primary">
                    <i class="bi bi-plus-lg"></i> <span th:text="#{project.create}">Crear Proyecto</span>
                </a>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th th:text="#{project.name}">Nombre</th>
                            <th th:text="#{project.description}">Descripción</th>
                            <th th:text="#{project.mocks.count}">Mocks</th>
                            <th th:text="#{project.created}">Creado</th>
                            <th th:text="#{project.actions}">Acciones</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="proyecto : ${proyectos}">
                            <td th:text="${proyecto.nombre}">Proyecto</td>
                            <td th:text="${proyecto.descripcion}">Desc</td>
                            <td>
                                <span class="badge bg-info" th:text="${proyecto.mocks != null ? proyecto.mocks.size() : 0}">0</span>
                            </td>
                            <td th:text="${#temporals.format(proyecto.fechaCreacion, 'dd/MM/yyyy HH:mm')}">01/01/2025</td>
                            <td>
                                <a th:href="@{'/proyectos/' + ${proyecto.id} + '/mocks'}" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-plug"></i> Mocks
                                </a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(proyectos)}">
                            <td colspan="5" class="text-center text-muted py-4">
                                <i class="bi bi-inbox fs-3 d-block mb-2"></i>
                                No hay proyectos aún
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
