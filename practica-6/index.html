<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reservas de Laboratorio - EICT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <h1>Reservas de Laboratorio- EICT</h1>
        <button id="pastRecordsToggle" class="btn btn-link" type="button">
          Registros Pasados
        </button>
      </header>

      <section class="toolbar" aria-label="Acciones principales">
        <button id="addReservationBtn" class="btn btn-primary" type="button">
          Agregar Reserva
        </button>
        <span id="viewBadge" class="view-badge">Mostrando: Activas</span>
      </section>

      <section id="pastFilterPanel" class="panel hidden" aria-label="Filtro de registros pasados">
        <h2>Filtrar registros pasados</h2>
        <div class="filter-grid">
          <label for="pastFromDate">Desde</label>
          <input id="pastFromDate" type="date" />

          <label for="pastToDate">Hasta</label>
          <input id="pastToDate" type="date" />
        </div>
        <div class="panel-actions">
          <button id="applyPastFilterBtn" class="btn btn-secondary" type="button">Aplicar</button>
          <button id="showActiveBtn" class="btn btn-ghost" type="button">Volver a Activas</button>
        </div>
      </section>

      <section class="table-wrap" aria-live="polite">
        <table>
          <thead>
            <tr>
              <th scope="col">ID</th>
              <th scope="col">Nombre</th>
              <th scope="col">Laboratorio</th>
              <th scope="col">Fecha y hora</th>
            </tr>
          </thead>
          <tbody id="reservationsBody"></tbody>
        </table>
      </section>

      <p id="statusMessage" class="status" role="status"></p>
    </main>

    <div id="reservationModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <section class="modal-card">
        <header class="modal-header">
          <h2 id="modalTitle">Registro Reserva</h2>
        </header>

        <form id="reservationForm" novalidate>
          <div class="form-grid">
            <label for="inputId">ID</label>
            <input id="inputId" name="id" type="text" required />

            <label for="inputNombre">Nombre</label>
            <input id="inputNombre" name="nombre" type="text" required />

            <label for="inputCarrera">Carrera</label>
            <input id="inputCarrera" name="carrera" type="text" required />

            <label for="inputLaboratorio">Laboratorio</label>
            <select id="inputLaboratorio" name="laboratorio" required>
              <option value="">Selecciona una opción</option>
              <option value="Lab 1">Lab 1</option>
              <option value="Lab 2">Lab 2</option>
              <option value="Lab 3">Lab 3</option>
              <option value="Lab 4">Lab 4</option>
            </select>

            <label for="inputFechaReservaDate">Fecha Reserva</label>
            <input id="inputFechaReservaDate" name="fechaReservaDate" type="date" required />

            <label for="inputFechaReservaHour">Hora Reserva</label>
            <select id="inputFechaReservaHour" name="fechaReservaHour" required>
              <option value="">Selecciona una hora</option>
              <option value="08">08:00:00</option>
              <option value="09">09:00:00</option>
              <option value="10">10:00:00</option>
              <option value="11">11:00:00</option>
              <option value="12">12:00:00</option>
              <option value="13">13:00:00</option>
              <option value="14">14:00:00</option>
              <option value="15">15:00:00</option>
              <option value="16">16:00:00</option>
              <option value="17">17:00:00</option>
              <option value="18">18:00:00</option>
              <option value="19">19:00:00</option>
              <option value="20">20:00:00</option>
              <option value="21">21:00:00</option>
            </select>
          </div>

          <p class="help-text">Registros pasados: use dd/MM/yyyy. Reserva: seleccione fecha y hora exacta.</p>
          <p id="formError" class="form-error" role="alert"></p>

          <footer class="modal-actions">
            <button class="btn btn-primary" type="submit">OK</button>
            <button id="cancelModalBtn" class="btn btn-ghost" type="button">Cancel</button>
          </footer>
        </form>
      </section>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
