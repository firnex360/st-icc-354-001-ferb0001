# =============================================================================
# RESERVATION MICROSERVICE - Configuration
# =============================================================================
# Manages the full reservation lifecycle (create, modify, cancel).
# Connects to PostgreSQL and registers with Eureka Discovery Server.
# Uses OpenFeign to communicate with the Catalog Service for property lookups.
# =============================================================================

server:
  port: 8083

spring:
  application:
    name: reservation-service   # Registered in Eureka as RESERVATION-SERVICE

  # --- PostgreSQL Datasource ---
  datasource:
    url: jdbc:postgresql://localhost:5432/hospedaje_reservations
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update    # Auto-create/update tables in dev. Use "validate" in prod.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# --- Service Discovery: register with Eureka ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# --- Logging ---
logging:
  level:
    com.hospedaje.reservation: DEBUG
    org.springframework.cloud.openfeign: DEBUG
