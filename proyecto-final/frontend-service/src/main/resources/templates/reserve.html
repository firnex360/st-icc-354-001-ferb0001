<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Book Property - Hotel Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-blue-600 p-4 text-white">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">Hotel Platform</h1>
        <div class="flex items-center gap-4">
            <a th:href="@{/catalog}" class="hover:underline">Catalog</a>
            <a th:if="${role == 'ROLE_ADMIN'}" th:href="@{/dashboard}"   class="hover:underline">Dashboard</a>
            <a th:if="${role == 'ROLE_ADMIN'}" th:href="@{/admin/users}" class="hover:underline">Users</a>
            <a th:if="${role != 'ROLE_ADMIN'}" th:href="@{/my-reservations}" class="hover:underline">My Reservations</a>
            <a th:href="@{/profile}" class="hover:underline">My Profile</a>
            <span class="text-blue-200 text-sm font-medium" th:text="${username}"></span>
            <a th:href="@{/logout}" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded">Logout</a>
        </div>
    </div>
</nav>

<div class="container mx-auto mt-8 p-4 max-w-3xl">

    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
        <span th:text="${error}"></span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">

        <!-- Property summary -->
        <div th:if="${property != null}" class="bg-white rounded-lg shadow-md p-6 h-fit">
            <h2 class="text-xl font-bold text-gray-800 mb-1" th:text="${property.name}">Property</h2>
            <p class="text-gray-500 text-sm mb-4" th:text="${property.location}">Location</p>

            <div class="flex gap-2 flex-wrap mb-4">
                <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-2 py-1 rounded-full"
                      th:text="${property.roomType}">Room</span>
                <span class="bg-green-100 text-green-700 text-xs font-semibold px-2 py-1 rounded-full"
                      th:if="${property.maxGuests != null}"
                      th:text="'Up to ' + ${property.maxGuests} + ' guests'">Guests</span>
            </div>

            <div class="border-t pt-4">
                <p class="text-gray-500 text-sm">Nightly rate</p>
                <p class="text-2xl font-bold text-blue-600"
                   th:text="${'$' + property.pricePerNight}">$0</p>
            </div>

            <div th:if="${property.availableFrom != null}" class="mt-3 text-sm text-gray-500">
                Available: <span th:text="${property.availableFrom}"></span>
                — <span th:text="${property.availableTo}"></span>
            </div>
        </div>

        <!-- Booking form -->
        <div class="bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-bold text-gray-800 mb-6">Your Booking Details</h2>

            <form th:action="@{/reserve/{id}(id=${property.id})}" method="post">

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="checkInDate">
                        Check-in Date
                    </label>
                    <input type="date" id="checkInDate" name="checkInDate" required
                           th:min="${property.availableFrom}"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="checkOutDate">
                        Check-out Date
                    </label>
                    <input type="date" id="checkOutDate" name="checkOutDate" required
                           th:min="${property.availableFrom}"
                           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700 mb-1" for="numberOfGuests">
                        Number of Guests
                    </label>
                    <input type="number" id="numberOfGuests" name="numberOfGuests"
                           min="1" th:max="${property.maxGuests}" value="1" required
                           class="w-full border border-gray-300 rounded-md px-3 py-2 text-sm
                                  focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="bg-blue-50 rounded-lg p-3 mb-6 text-sm text-blue-700">
                    You will be charged <strong>18% tax</strong> on top of the nightly rate at checkout.
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition">
                    Proceed to Payment
                </button>
            </form>

            <a th:href="@{/property/{id}(id=${property.id})}"
               class="block text-center text-gray-500 hover:text-gray-700 text-sm mt-4">
                ← Back to property details
            </a>
        </div>

    </div>
</div>

</body>
</html>
