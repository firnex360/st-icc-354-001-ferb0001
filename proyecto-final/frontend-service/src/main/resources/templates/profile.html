<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Profile - Hotel Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-blue-600 p-4 text-white">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">Hotel Platform</h1>
        <div class="flex items-center gap-4">
            <a th:href="@{/catalog}" class="hover:underline">Catalog</a>
            <a th:if="${role == 'ROLE_ADMIN'}" th:href="@{/dashboard}"    class="hover:underline">Dashboard</a>
            <a th:if="${role == 'ROLE_ADMIN'}" th:href="@{/admin/users}"  class="hover:underline">Users</a>
            <a th:if="${role != 'ROLE_ADMIN'}" th:href="@{/my-reservations}" class="hover:underline">My Reservations</a>
            <a th:href="@{/profile}" class="font-semibold underline">My Profile</a>
            <span class="text-blue-200 text-sm font-medium" th:text="${username}"></span>
            <a th:href="@{/logout}" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded">Logout</a>
        </div>
    </div>
</nav>

<div class="container mx-auto mt-10 p-4 max-w-lg">

    <!-- Error -->
    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
        <span th:text="${error}"></span>
    </div>

    <!-- Profile card -->
    <div th:if="${user != null}" class="bg-white rounded-2xl shadow-md overflow-hidden">

        <!-- Coloured header with avatar -->
        <div class="bg-blue-600 h-28 flex items-end px-8 pb-0 relative">
            <div class="absolute -bottom-10 left-8 w-20 h-20 rounded-full bg-white border-4 border-white shadow-md
                        flex items-center justify-center text-blue-600 text-3xl font-extrabold"
                 th:text="${user.firstName != null ? #strings.toUpperCase(#strings.substring(user.firstName, 0, 1)) : '?'}">
            </div>
        </div>

        <!-- Details -->
        <div class="pt-14 px-8 pb-8">

            <!-- Full name -->
            <h2 class="text-2xl font-bold text-gray-800"
                th:text="${(user.firstName != null ? user.firstName : '') + ' ' + (user.lastName != null ? user.lastName : '')}">
                Full Name
            </h2>

            <!-- Role badge -->
            <div class="mt-1 mb-6">
                <span th:if="${user.role == 'ADMIN'}"
                      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-purple-100 text-purple-700">
                    Administrator
                </span>
                <span th:if="${user.role == 'CLIENT'}"
                      class="inline-flex items-center px-3 py-1 rounded-full text-xs font-semibold bg-green-100 text-green-700">
                    Client
                </span>
            </div>

            <!-- Info rows -->
            <div class="space-y-4">

                <div class="flex items-center gap-3 text-sm">
                    <!-- Email icon -->
                    <svg class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                    </svg>
                    <div>
                        <p class="text-xs text-gray-400 uppercase tracking-wider">Email</p>
                        <p class="font-medium text-gray-700" th:text="${user.email}">email@example.com</p>
                    </div>
                </div>

                <div class="flex items-center gap-3 text-sm">
                    <!-- Username icon -->
                    <svg class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                    </svg>
                    <div>
                        <p class="text-xs text-gray-400 uppercase tracking-wider">Username</p>
                        <p class="font-medium text-gray-700"
                           th:text="${user.email != null ? '@' + #strings.substringBefore(user.email, '@') : '—'}">
                        </p>
                    </div>
                </div>

                <div class="flex items-center gap-3 text-sm">
                    <!-- Role icon -->
                    <svg class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04
                                 A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622
                                 0-1.042-.133-2.052-.382-3.016z"/>
                    </svg>
                    <div>
                        <p class="text-xs text-gray-400 uppercase tracking-wider">Role</p>
                        <p class="font-medium text-gray-700" th:text="${user.role}">CLIENT</p>
                    </div>
                </div>

            </div>

            <!-- Quick-action links -->
            <div class="mt-8 flex flex-col sm:flex-row gap-3">
                <a th:if="${user.role != 'ADMIN'}"
                   th:href="@{/my-reservations}"
                   class="flex-1 text-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">
                    My Reservations
                </a>
                <a th:if="${user.role == 'ADMIN'}"
                   th:href="@{/admin/users}"
                   class="flex-1 text-center bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded-lg transition">
                    Manage Users
                </a>
                <a th:href="@{/catalog}"
                   class="flex-1 text-center border border-gray-300 hover:bg-gray-50 text-gray-600 font-semibold py-2 px-4 rounded-lg transition">
                    Browse Catalog
                </a>
            </div>
        </div>
    </div>

</div>

</body>
</html>
