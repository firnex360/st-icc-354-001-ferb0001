<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Property Catalog - Hotel Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-blue-600 p-4 text-white">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">Property Catalog</h1>
        <div class="flex items-center gap-4">
            <a th:if="${role == 'ROLE_ADMIN'}" th:href="@{/dashboard}" class="hover:underline">Dashboard</a>
            <a th:if="${role != 'ROLE_ADMIN'}" th:href="@{/my-reservations}" class="hover:underline">My Reservations</a>
            <span class="text-blue-200 text-sm font-medium" th:text="${username}"></span>
            <a th:href="@{/logout}" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded">Logout</a>
        </div>
    </div>
</nav>

<div class="container mx-auto mt-8 p-4">
    <h2 class="text-2xl font-semibold mb-6">Available Properties</h2>

    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
        <span th:text="${error}"></span>
    </div>

    <!-- Search / Filter Panel -->
    <div class="bg-white p-6 rounded-lg shadow-md mb-8">
        <form th:action="@{/catalog}" method="get" class="flex flex-col md:flex-row md:items-end gap-4">
            
            <div class="flex-1">
                <label for="place" class="block text-sm font-medium text-gray-700 mb-1">Place / City</label>
                <input type="text" id="place" name="place" th:value="${place}" placeholder="E.g., New York" 
                       class="w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div class="w-full md:w-32">
                <label for="minPrice" class="block text-sm font-medium text-gray-700 mb-1">Min Price $</label>
                <input type="number" id="minPrice" name="minPrice" th:value="${minPrice}" min="0" placeholder="0" 
                       class="w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div class="w-full md:w-32">
                <label for="maxPrice" class="block text-sm font-medium text-gray-700 mb-1">Max Price $</label>
                <input type="number" id="maxPrice" name="maxPrice" th:value="${maxPrice}" min="0" placeholder="9999" 
                       class="w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div class="w-full md:w-40">
                <label for="minRating" class="block text-sm font-medium text-gray-700 mb-1">Minimum Rating</label>
                <select id="minRating" name="minRating" class="w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm bg-white">
                    <option value="" th:selected="${minRating == null}">Any Rating</option>
                    <option value="3" th:selected="${minRating == 3}">3+ Stars</option>
                    <option value="4" th:selected="${minRating == 4}">4+ Stars</option>
                    <option value="5" th:selected="${minRating == 5}">5 Stars</option>
                </select>
            </div>

            <div class="w-full md:w-48">
                <label for="checkInDate" class="block text-sm font-medium text-gray-700 mb-1">Check-in Date</label>
                <input type="date" id="checkInDate" name="checkInDate" th:value="${checkInDate}" 
                       class="w-full rounded-md border-gray-300 shadow-sm px-3 py-2 border focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
            </div>

            <div class="flex gap-2 w-full md:w-auto mt-4 md:mt-0">
                <button type="submit" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-6 rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition">
                    Search
                </button>
                <a th:href="@{/catalog}" class="flex-1 md:flex-none bg-gray-200 hover:bg-gray-300 text-gray-800 font-medium py-2 px-4 text-center rounded-md focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-gray-500 transition">
                    Clear
                </a>
            </div>
        </form>
    </div>

    <!-- Properties Grid -->
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
        <div th:each="property : ${properties}" class="bg-white rounded-lg shadow-md overflow-hidden hover:shadow-lg transition">
            <!-- Image gallery or placeholder -->
            <div th:if="${property.imageUrls != null and !property.imageUrls.empty}">
                <img th:src="${property.imageUrls[0]}" alt="Property image"
                     class="h-48 w-full object-cover">
            </div>
            <div th:if="${property.imageUrls == null or property.imageUrls.empty}" 
                 class="h-48 bg-gray-300 w-full object-cover flex items-center justify-center text-gray-500">
                <span class="text-sm">Image not available</span>
            </div>
            
            <div class="p-4">
                <h3 class="text-lg font-bold text-gray-800" th:text="${property.name}">Property Name</h3>
                <p class="text-sm text-gray-600 mt-1" th:text="${property.location}">Location</p>
                <div class="mt-4 flex justify-between items-center">
                    <span class="text-blue-600 font-bold" th:text="${'$' + property.pricePerNight + ' / night'}">$150 / night</span>
                    <a th:href="@{/property/{id}(id=${property.id})}"
                       class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded text-sm">
                        Details
                    </a>
                </div>
            </div>
        </div>
        
        <div th:if="${properties == null || properties.empty}" class="col-span-full text-center text-gray-500 mt-8">
            <p>No properties available at the moment.</p>
        </div>
    </div>
</div>

</body>
</html>
