<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${property != null ? property.name + ' - Hotel Platform' : 'Property - Hotel Platform'}">Property Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-blue-600 p-4 text-white">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">Hotel Platform</h1>
        <div class="flex items-center gap-4">
            <a th:href="@{/catalog}" class="hover:underline">Catalog</a>
            <a th:if="${role == 'ROLE_ADMIN'}" th:href="@{/dashboard}" class="hover:underline">Dashboard</a>
            <span class="text-blue-200 text-sm font-medium" th:text="${username}"></span>
            <a th:href="@{/logout}" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded">Logout</a>
        </div>
    </div>
</nav>

<div class="container mx-auto mt-8 p-4 max-w-4xl">

    <!-- Error state -->
    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
        <span th:text="${error}"></span>
        <div class="mt-3">
            <a th:href="@{/catalog}" class="text-blue-600 hover:underline font-semibold">← Back to Catalog</a>
        </div>
    </div>

    <!-- Property detail card -->
    <div th:if="${property != null}" class="bg-white rounded-lg shadow-md overflow-hidden">

        <!-- Image gallery or placeholder -->
        <div th:if="${property.imageUrls != null and !property.imageUrls.empty}">
            <img th:src="${property.imageUrls[0]}" alt="Property image"
                 class="w-full h-72 object-cover">
        </div>
        <div th:if="${property.imageUrls == null or property.imageUrls.empty}"
             class="w-full h-72 bg-gray-200 flex items-center justify-center text-gray-400 text-lg">
            No image available
        </div>

        <div class="p-8">

            <!-- Header -->
            <div class="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-3 mb-6">
                <div>
                    <h2 class="text-3xl font-bold text-gray-800" th:text="${property.name}">Property Name</h2>
                    <p class="text-gray-500 mt-1 flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                  d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                        </svg>
                        <span th:text="${property.location}">Location</span>
                    </p>
                </div>
                <div class="text-right">
                    <p class="text-3xl font-bold text-blue-600" th:text="${'$' + property.pricePerNight}">$0</p>
                    <p class="text-gray-400 text-sm">per night</p>
                </div>
            </div>

            <!-- Badges -->
            <div class="flex flex-wrap gap-2 mb-6">
                <span th:if="${property.roomType != null}"
                      class="bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full"
                      th:text="${property.roomType}">Room Type</span>
                <span th:if="${property.maxGuests != null}"
                      class="bg-green-100 text-green-700 text-xs font-semibold px-3 py-1 rounded-full"
                      th:text="'Up to ' + ${property.maxGuests} + ' guests'">Guests</span>
                <span th:if="${property.active == true}"
                      class="bg-emerald-100 text-emerald-700 text-xs font-semibold px-3 py-1 rounded-full">
                    Available
                </span>
                <span th:if="${property.active == false}"
                      class="bg-red-100 text-red-700 text-xs font-semibold px-3 py-1 rounded-full">
                    Unavailable
                </span>
            </div>

            <!-- Description -->
            <div class="mb-6" th:if="${property.description != null}">
                <h3 class="text-lg font-semibold text-gray-700 mb-2">About this property</h3>
                <p class="text-gray-600 leading-relaxed" th:text="${property.description}">Description</p>
            </div>

            <!-- Availability -->
            <div class="mb-6 grid grid-cols-1 sm:grid-cols-2 gap-4"
                 th:if="${property.availableFrom != null or property.availableTo != null}">
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Available From</p>
                    <p class="text-gray-800 font-semibold" th:text="${property.availableFrom}">—</p>
                </div>
                <div class="bg-gray-50 rounded-lg p-4">
                    <p class="text-xs text-gray-400 uppercase tracking-wider mb-1">Available Until</p>
                    <p class="text-gray-800 font-semibold" th:text="${property.availableTo}">—</p>
                </div>
            </div>

            <!-- Amenities -->
            <div class="mb-8" th:if="${property.amenities != null and !property.amenities.empty}">
                <h3 class="text-lg font-semibold text-gray-700 mb-3">Amenities</h3>
                <div class="flex flex-wrap gap-2">
                    <span th:each="amenity : ${property.amenities}"
                          class="bg-gray-100 text-gray-600 text-sm px-3 py-1 rounded-full"
                          th:text="${amenity}">Amenity</span>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex flex-col sm:flex-row gap-3 pt-4 border-t border-gray-100">
                <a th:href="@{/catalog}"
                   class="text-center px-6 py-3 rounded-lg border border-gray-300 text-gray-600 hover:bg-gray-50 font-semibold">
                    ← Back to Catalog
                </a>
                <a th:if="${property.active == true}"
                   th:href="@{/reserve/{id}(id=${property.id})}"
                   class="flex-1 text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition">
                    Reserve Now
                </a>
                <button th:if="${property.active == false}" disabled
                        class="flex-1 bg-gray-300 text-gray-500 font-bold py-3 px-6 rounded-lg cursor-not-allowed">
                    Not Available
                </button>
            </div>

        </div>
    </div>

</div>

</body>
</html>
