<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>User Management - Hotel Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="bg-gray-100 min-h-screen">

<!-- Navbar -->
<nav class="bg-blue-600 p-4 text-white">
    <div class="container mx-auto flex justify-between items-center">
        <h1 class="text-xl font-bold">Hotel Platform</h1>
        <div class="flex items-center gap-4">
            <a th:href="@{/catalog}"   class="hover:underline">Catalog</a>
            <a th:href="@{/dashboard}" class="hover:underline">Dashboard</a>
            <a th:href="@{/admin/users}" class="font-semibold underline">Users</a>
            <span class="text-blue-200 text-sm font-medium" th:text="${username}"></span>
            <a th:href="@{/logout}" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded">Logout</a>
        </div>
    </div>
</nav>

<div class="container mx-auto mt-8 p-4 max-w-5xl">

    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Registered Users</h2>
        <span th:if="${users != null}"
              class="text-sm text-gray-500"
              th:text="${users.size() + ' user' + (users.size() == 1 ? '' : 's')}"></span>
    </div>

    <!-- Error -->
    <div th:if="${error}" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-6">
        <span th:text="${error}"></span>
    </div>

    <!-- Users table -->
    <div th:if="${users != null and !users.empty}" class="bg-white rounded-xl shadow-md overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 border-b border-gray-200">
                <tr>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Name</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Email</th>
                    <th class="text-left px-6 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider">Role</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <tr th:each="u : ${users}" class="hover:bg-gray-50 transition">

                    <!-- Name + avatar initial -->
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3">
                            <!-- Avatar: first letter of firstName -->
                            <div class="w-9 h-9 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold text-sm flex-shrink-0"
                                 th:text="${u.firstName != null ? #strings.toUpperCase(#strings.substring(u.firstName, 0, 1)) : '?'}">
                            </div>
                            <div>
                                <p class="font-medium text-gray-800"
                                   th:text="${(u.firstName != null ? u.firstName : '') + ' ' + (u.lastName != null ? u.lastName : '')}">
                                    Full Name
                                </p>
                                <p class="text-xs text-gray-400"
                                   th:text="${'@' + (u.email != null ? #strings.substringBefore(u.email, '@') : '')}">
                                </p>
                            </div>
                        </div>
                    </td>

                    <!-- Email -->
                    <td class="px-6 py-4 text-gray-600" th:text="${u.email}">email@example.com</td>

                    <!-- Role badge -->
                    <td class="px-6 py-4">
                        <span th:if="${u.role == 'ADMIN'}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-purple-100 text-purple-700">
                            Admin
                        </span>
                        <span th:if="${u.role == 'CLIENT'}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-green-100 text-green-700">
                            Client
                        </span>
                        <span th:if="${u.role != 'ADMIN' and u.role != 'CLIENT'}"
                              class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold bg-gray-100 text-gray-600"
                              th:text="${u.role}">
                        </span>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Empty state -->
    <div th:if="${users == null or users.empty}"
         class="bg-white rounded-xl shadow-sm p-12 text-center text-gray-400">
        <svg class="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                  d="M17 20h5v-2a4 4 0 00-4-4h-1M9 20H4v-2a4 4 0 014-4h1m4-4a4 4 0 100-8 4 4 0 000 8z"/>
        </svg>
        <p class="font-medium">No users found.</p>
    </div>

</div>

</body>
</html>
