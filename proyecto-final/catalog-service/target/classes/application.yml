# =============================================================================
# PROPERTY CATALOG MICROSERVICE - Configuration
# =============================================================================
# Manages the inventory of available properties (hotels, apartments, rooms).
# Connects to MongoDB and registers with Eureka Discovery Server.
# =============================================================================

server:
  port: 8082

spring:
  application:
    name: catalog-service   # Registered in Eureka as CATALOG-SERVICE

  # --- MongoDB Connection ---
  data:
    mongodb:
      uri: mongodb://localhost:27017/hospedaje_catalog
      # For authenticated connections, use:
      # uri: mongodb://user:password@localhost:27017/hospedaje_catalog?authSource=admin

# --- Service Discovery: register with Eureka ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# --- Logging ---
logging:
  level:
    com.hospedaje.catalog: DEBUG
    org.springframework.data.mongodb: DEBUG
