server:
  port: 8085

spring:
  application:
    name: notifications-service   # Registered in Eureka as NOTIFICATIONS-SERVICE

  # ===========================================================================
  # SMTP MAIL CONFIGURATION
  # ===========================================================================
  # ⚠️  REPLACE the values below with your real SMTP credentials!
  #
  #     For Gmail:
  #       host: smtp.gmail.com
  #       port: 587
  #       username: your-email@gmail.com
  #       password: your-app-password  (NOT your account password!)
  #
  #     To generate a Gmail App Password:
  #       1. Go to https://myaccount.google.com/apppasswords
  #       2. Select "Mail" and your device
  #       3. Use the 16-character code as the password below

  mail:
    host: smtp.gmail.com                    
    port: 587                               
    username: fernandorodriguezb27@gmail.com          
    password: badn whxv trav tsvt
    properties:
      mail:
        smtp:
          auth: true                        # Enable SMTP authentication
          starttls:
            enabled: true                   # Enable TLS encryption
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# --- Default "from" address for outgoing emails ---
app:
  mail:
    from: FERB0001@ce.pucmm.edu.do             

# --- Service Discovery: register with Eureka ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# --- Logging ---
logging:
  level:
    com.hospedaje.notifications: DEBUG
    org.springframework.mail: DEBUG
