# =============================================================================
# Sample configuration for the Catalog Service (Property Catalog)
# =============================================================================
# This file is served by the Config Server to the catalog-service microservice.
# Place additional service configs in this same directory, named after
# their spring.application.name (e.g., reservation-service.yml).
# =============================================================================

server:
  port: 8081

spring:
  data:
    mongodb:
      uri: mongodb://localhost:27017/hospedaje_catalogo
      database: hospedaje_catalogo

# Register with Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# Distributed tracing
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
