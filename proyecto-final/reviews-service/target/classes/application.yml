# =============================================================================
# REVIEWS & RATINGS MICROSERVICE - Configuration
# =============================================================================
# Allows clients to leave 1-5 star ratings and comments after their stay.
# Connects to PostgreSQL and registers with Eureka Discovery Server.
# =============================================================================

server:
  port: 8084

spring:
  application:
    name: reviews-service   # Registered in Eureka as REVIEWS-SERVICE

  # --- PostgreSQL Datasource ---
  datasource:
    url: jdbc:postgresql://localhost:5432/hospedaje_reviews
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  # --- JPA / Hibernate ---
  jpa:
    hibernate:
      ddl-auto: update    # Auto-create/update tables in dev. Use "validate" in prod.
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# --- Service Discovery: register with Eureka ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

# --- Logging ---
logging:
  level:
    com.hospedaje.reviews: DEBUG
