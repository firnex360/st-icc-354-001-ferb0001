version: '3.8'

services:
  api-gateway:
    build: 
      context: ./api-gateway
    ports:
      - "8080:8080"
    networks:
      - hospedaje-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway
    networks:
      - hospedaje-network

networks:
  hospedaje-network:
    driver: bridge