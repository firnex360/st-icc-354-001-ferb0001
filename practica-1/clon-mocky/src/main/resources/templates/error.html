<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="~{fragments/layout :: head('Error')}">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error</title>
</head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/layout :: navbar}"></nav>

    <main class="container flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="text-center py-5">
            <i class="bi bi-exclamation-triangle display-1 text-warning"></i>
            <h1 class="mt-3" th:text="${status ?: 'Error'}">Error</h1>
            <p class="lead text-muted" th:text="${message} ?: #{msg.error.general}">Ha ocurrido un error</p>
            <a th:href="@{/dashboard}" class="btn btn-primary mt-3">
                <i class="bi bi-house"></i> <span th:text="#{nav.home}">Inicio</span>
            </a>
        </div>
    </main>

    <footer th:replace="~{fragments/layout :: footer}"></footer>
    <div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
